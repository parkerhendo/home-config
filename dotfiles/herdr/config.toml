onboarding = false
[theme]
name = "gruvbox"
auto_switch = false

[theme.custom]
# Gruvbox's default surface_dim matches the panel background, which hides
# separators such as the sidebar/main divider.
surface_dim = "#3c3836"

[keys]
# Match tmux prefix (see dotfiles/tmux.conf)
prefix = "ctrl+a"

# tmux binds prefix+h to split -v (top/bottom); herdr's split_horizontal is
# the equivalent (a horizontal divider). tmux's prefix+v -> split -h already
# matches herdr's split_vertical default, so it's left unset.
split_horizontal = "prefix+h"

# tmux uses direct (no-prefix) Alt+hjkl to move between panes. Herdr's
# defaults put pane focus on prefix+h/j/k/l instead, which now collides with
# split_horizontal above, so move focus here to match tmux's actual keys.
# focus_pane_left = "alt+h"
# focus_pane_down = "alt+j"
# focus_pane_up = "alt+k"
# focus_pane_right = "alt+l"

# tmux's `r` (at the prefix) reloads ~/.tmux.conf; mirror that here.
reload_config = "prefix+r"
# resize_mode defaults to prefix+r in herdr; move it since reload_config now
# owns that slot. tmux has no equivalent modal resize (it uses direct
# Ctrl+hjkl instead, which herdr doesn't expose as a bindable action).
resize_mode = "prefix+shift+r"

# Use Vim keys to move through the workspace list opened by prefix+w.
navigate_workspace_down = "j"
navigate_workspace_up = "k"

# Repurpose prefix+shift+n/p (default: new_workspace / rename_pane) for
# workspace switching, which is unbound by default.
next_workspace = "prefix+shift+n"
previous_workspace = "prefix+shift+p"
new_workspace = ""
rename_pane = ""

# Keep Herdr's dashboard/sidebar available, but not on prefix+b since C-b is not the prefix here.
toggle_sidebar = "prefix+b"

# vim-herdr-navigation: seamless Ctrl+h/j/k/l movement between herdr panes
# and Vim/Neovim splits (https://github.com/paulbkim-dev/vim-herdr-navigation).
# Ctrl+hjkl is otherwise unused here (pane focus lives on Alt+hjkl above to
# match tmux), so this is free to claim.
[[keys.command]]
key = "alt+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "alt+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "alt+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "alt+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

[ui]
agent_panel_sort = "spaces"
sidebar_width = 32
sidebar_min_width = 18
sidebar_max_width = 36
mouse_capture = true
right_click_passthrough_modifier = "ctrl"
mouse_scroll_lines = 3

# Close panes/tabs without prompting.
confirm_close = false
prompt_new_tab_name = true
prompt_new_workspace_name = true

show_agent_labels_on_pane_borders = false

[ui.toast.herdr]
position = "top-right"

[ui.sound]
# Keep sound notifications disabled.
enabled = false

[session]
# Resume supported coding agents when restoring sessions.
resume_agents_on_restore = true

[experimental]
# Persist recent pane output to disk.
# This persists recent pane output to disk; keep in mind it may include secrets.
pane_history = true
allow_nested = false
kitty_graphics = true

[advanced]
# Scrollback limit is byte-based.
scrollback_limit_bytes = 52428800
